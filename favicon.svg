<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ball base -->
  <circle cx="32" cy="32" r="30" fill="white" stroke="#222" stroke-width="2.5"/>

  <!-- Soccer ball patches (simplified classic pattern) -->
  <!-- Central pentagon -->
  <polygon points="32,14 41,21 38,32 26,32 23,21" fill="#222"/>
  <!-- Top-left patch -->
  <polygon points="14,20 23,21 26,32 16,38 10,29" fill="#222"/>
  <!-- Top-right patch -->
  <polygon points="50,20 41,21 38,32 48,38 54,29" fill="#222"/>
  <!-- Bottom-left patch -->
  <polygon points="16,38 26,32 30,44 22,52 13,47" fill="#222"/>
  <!-- Bottom-right patch -->
  <polygon points="48,38 38,32 34,44 42,52 51,47" fill="#222"/>

  <!-- Number 1 in gold -->
  <text x="32" y="38" text-anchor="middle" font-family="Arial Black, sans-serif"
        font-size="20" font-weight="900" fill="#f5c518" stroke="#000" stroke-width="1">1</text>
</svg>
